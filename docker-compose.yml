# (o conteúdo completo já está pronto; basta salvar sem a linha 1 “version: …”)
services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - lnso_network

  frontend:
    container_name: sgfs_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3001/api"
    networks:
      - lnso_network
    restart: unless-stopped

  backend:
    container_name: sgfs_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-sgfs_premium_secret_2026}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass}@postgres_db:5432/${DB_NAME:-gestao_folha}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - postgres_db
    networks:
      - lnso_network
    restart: unless-stopped

  postgres_db:
    container_name: sgfs_postgres_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gestao_folha
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lnso_network
    restart: unless-stopped

networks:
  lnso_network:
    external: true

volumes:
  postgres_data:
