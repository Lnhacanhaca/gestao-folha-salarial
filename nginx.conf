# =========================================================================
# CONFIGURAÇÃO DO NGINX PARA DEPLOY EM VPS (PRODUÇÃO)
# Salve este arquivo em /etc/nginx/sites-available/gestao-folha
# e ative-o executando: ln -s /etc/nginx/sites-available/gestao-folha /etc/nginx/sites-enabled/
# =========================================================================

# --- Redirecionamento Automático: HTTP para HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name folha.lnsotech.com www.folha.lnsotech.com; # <--- Substitua pelo seu domínio real

    # Necessário para validações de domínio automáticas do Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Bloco do Servidor Principal Seguro (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name folha.lnsotech.com www.folha.lnsotech.com; # <--- Substitua pelo seu domínio real

    # --- Configurações de Certificado SSL (Let's Encrypt - Certbot) ---
    # Descomente e ajuste os caminhos abaixo após gerar seus certificados usando Certbot:
    # ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;

    # Otimização de Performance SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Protocolos de Segurança Modernos recomendados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # --- Cabeçalhos de Segurança Estritos (Security Headers) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # --- Limitações de Tamanho ---
    client_max_body_size 20M; # Permite uploads maiores (como arquivos CSV/Excel de folhas)

    # --- Otimização Gzip para Alta Performance ---
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # --- ROTAS ---

    # 1. Rota de API (/api/) -> Direciona para o container Backend (Porta 3001)
    location /api/ {
        # Reescreve chamadas se necessário ou apenas repassa
        proxy_pass http://127.0.0.1:3001/api/;
        
        # Protocolo e Buffers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Propagação do IP Real do Utilizador (Rigoroso)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Tempos limites de processamento de requisições de API pesadas
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 2. Rota de Aplicação Geral (/) -> Direciona para o container Frontend (Porta 8080)
    location / {
        proxy_pass http://127.0.0.1:8080/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs customizados
    access_log /var/log/nginx/sgfs_access.log;
    error_log /var/log/nginx/sgfs_error.log;
}
