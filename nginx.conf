# --------------------------------------------------------------
#  Gestão de Folha – Reverse proxy
#  Domínios: folha.lnsotech.com   sgfs.lnsotech.com
#  Porta de escuta: 81 (acessível via http://<IP>:81)
# --------------------------------------------------------------

server {
    listen 81;
    listen [::]:81;
    server_name
        folha.lnsotech.com www.folha.lnsotech.com
        sgfs.lnsotech.com   www.sgfs.lnsotech.com;

    # -------------------- Frontend (SPA) --------------------
    location / {
        # UI está rodando no container frontend → host 127.0.0.1:5173
        proxy_pass http://127.0.0.1:5173/;
        proxy_http_version 1.1;

        # Cabeçalhos essenciais para que o SPA “saiba” o host original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Time‑outs generosos para evitar abortos prematuros
        proxy_connect_timeout 60s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;

        # Habilita compressão automática (gzip) nas respostas do frontend
        proxy_set_header Accept-Encoding "";
    }
     # -------------------- API (backend) --------------------
    location /api/ {
        # API roda no container backend → host 127.0.0.1:3002
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
    }

    # -------------------- Logs --------------------
    access_log  /var/log/nginx/gestao_folha_access.log  combined;
    error_log   /var/log/nginx/gestao_folha_error.log   warn;

    # -------------------- Segurança básica --------------------
    # Bloqueia listagem de diretórios – não queremos servir arquivos do filesystem
    autoindex off;

    # Limite tamanho máximo de upload (ex: para uploads de arquivos CSV)
    client_max_body_size 20M;

    # Cabeçalhos de segurança padrão (não há HTTPS aqui, mas ainda são úteis)
    add_header X-Frame-Options "SAMEORIGIN"   always;
    add_header X-Content-Types-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}