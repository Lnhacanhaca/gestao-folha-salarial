name: SGFS Deploy & Backup

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar chave SSH
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # 3️⃣ Transferir arquivos (excluindo .git, node_modules, etc.)
      - name: Sync files to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          source: "."
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          # Excluir diretórios pesados que não são necessários no servidor
          rm: true
          # Ignore arquivos que não precisam ser enviados
          exclude: |
            .git*
            node_modules
            docker-compose.yml
            docker-compose.prod.yml
            .github
            .gitignore
            README.md

      # 4️⃣ Executar comandos remotos no VPS
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e   # aborta no primeiro erro
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # (Opcional) copiar .env do backup ou criar se não existir
            if [ ! -f .env ]; then
              echo "POSTGRES_USER=postgres" >> .env
              echo "POSTGRES_PASSWORD=postgres_secure_pass" >> .env
              echo "POSTGRES_DB=gestao_folha" >> .env
            fi

            # Escolher o compose correto
            COMPOSE_FILE="${{ secrets.DOCKER_COMPOSE_FILE }}"

            # Parar containers atuais (se existirem) e remover imagens antigas
            docker compose -f $COMPOSE_FILE down --remove-orphans

            # Build + up em modo detached
            docker compose -f $COMPOSE_FILE up -d --build

            # Verificar health dos containers (exemplo simples)
            docker compose -f $COMPOSE_FILE ps

            # Reload do Nginx para garantir que a nova config seja lida
            sudo systemctl reload nginx || sudo service nginx reload
