name: SGFS Deploy & Backup

on:
  push:
    branches: [main]
  workflow_dispatch:   # <--- permite "Run workflow" no GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar chave SSH
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # 3️⃣ Transferir arquivos (excluindo apenas o que realmente não precisa)
      - name: Sync files to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          source: "."
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          rm: true
          exclude: |
            .git*
            node_modules
            .github
            .gitignore
            README.md
            # NÃO exclua docker‑compose.yml nem docker‑compose.prod.yml

      # 4️⃣ Executar comandos remotos no VPS
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Cria .env com valores padrão caso ainda não exista
            if [ ! -f .env ]; then
              printf "POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=postgres_secure_pass\nPOSTGRES_DB=gestao_folha\n" > .env
            fi

            COMPOSE_FILE="${{ secrets.DOCKER_COMPOSE_FILE }}"   # ex.: docker-compose.prod.yml

            # Stop, clean old images, rebuild & start
            docker compose -f $COMPOSE_FILE down --remove-orphans
            docker compose -f $COMPOSE_FILE up -d --build

            # Mostra status dos containers (servirá como verificação automática)
            docker compose -f $COMPOSE_FILE ps

            # Reload Nginx (root → sudo não gera senha)
            sudo systemctl reload nginx || sudo service nginx reload
