version: "3.8"

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - lnso_network

  frontend:
    container_name: sgfs_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Define a URL pública da API para que o Vite compile corretamente os assets estáticos
        VITE_API_URL: "https://folha.lnsotech.com/api"
    networks:
      - lnso_network
    restart: unless-stopped

  backend:
    container_name: sgfs_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-sgfs_premium_secret_2026}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass}@postgres_db:5432/${DB_NAME:-gestao_folha}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres_db
    networks:
      - lnso_network
    restart: unless-stopped

  postgres_db:
    container_name: sgfs_postgres_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-gestao_folha}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lnso_network
    restart: unless-stopped

networks:
  lnso_network:
    external: true

volumes:
  postgres_data:
